# ==============================================================================
# docker-compose.test.yml  (รัน E2E test ครบวงจร)
# ------------------------------------------------------------------------------
# ไว้ทำอะไร : build แอปแบบโปรดักชัน แล้วให้ Playwright ยิงเทสต์ใส่
# ใช้ตอนไหน : ตอนอยากทดสอบ E2E บน image จริง หรือใช้ใน CI ให้ผ่าน/ไม่ผ่าน
# สำคัญ     : service `e2e` จะ exit ด้วย status code ของ Playwright
#             (--exit-code-from e2e) เอาไปเป็นตัวตัดสินผลใน CI ได้เลย
# คำสั่ง    : docker compose -f docker-compose.test.yml up --build \
#               --abort-on-container-exit --exit-code-from e2e
# ==============================================================================
services:
  # แอปที่ถูก build แบบโปรดักชัน เพื่อให้เทสต์ยิงใส่
  app:
    build:
      context: .
      target: runner
    image: wanix-client:test
    container_name: wanix-client-test
    environment:
      NODE_ENV: production
    expose:
      - "3000"                  # เปิดพอร์ตให้เฉพาะ service อื่นใน network เดียวกัน
    healthcheck:                # รอจนแอปพร้อม ก่อน service e2e จะเริ่ม
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/login"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s

  # ตัวรัน Playwright (ใช้ image ทางการที่มี browser ครบ)
  e2e:
    image: mcr.microsoft.com/playwright:v1.61.1-noble
    container_name: wanix-client-e2e
    working_dir: /app
    depends_on:
      app:
        condition: service_healthy   # เริ่มเทสต์ต่อเมื่อแอป healthy แล้ว
    environment:
      # ชี้ Playwright ไปที่ service `app` แทนการเปิด dev server เอง
      BASE_URL: http://app:3000
      CI: "true"
    volumes:
      - .:/app
      - /app/node_modules
    command: sh -c "npm ci && npx playwright test"
